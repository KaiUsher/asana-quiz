<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asana — Sanskrit Practice</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#faf7f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Asana">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── UPDATE OVERLAY ───────────────────────────────────── -->
  <div id="update-overlay" aria-hidden="true">Updating</div>

  <!-- ── HOME ────────────────────────────────────────────── -->
  <div id="screen-home" class="screen">
    <div class="container">

      <header class="home-header">
        <div class="app-title">Asana</div>
        <div class="app-subtitle">Sanskrit Memory Practice</div>
      </header>

      <div class="mastery-block">
        <div class="mastery-fraction">
          <span id="stat-mastered">0</span><span class="mastery-total" id="stat-total">&thinsp;/&thinsp;30</span>
        </div>
        <div class="mastery-label">poses mastered<span class="mastery-caret" id="mastery-caret"></span></div>
        <div class="mastery-bar-track">
          <div class="mastery-bar-practicing" id="mastery-bar-practicing"></div>
          <div class="mastery-bar-mastered" id="mastery-bar-mastered"></div>
        </div>
        <div class="mastery-meta-row">
          <div class="mastery-sub" id="mastery-sub"></div>
          <div class="streak-row" id="streak-row"></div>
        </div>
      </div>

      <button id="start-btn" class="btn-primary btn-ember">Begin Practice</button>

<button id="settings-toggle" class="settings-toggle">
        <span id="settings-toggle-label">Customise session</span>
        <span id="settings-caret" class="settings-caret"></span>
      </button>

      <div id="settings-panel" class="settings-panel">
        <div class="settings-inner">
          <div class="section-label">Practice focus</div>
          <div id="category-pills" class="category-pills"></div>

        </div>
      </div>

      <div class="home-footer">
        <button id="glossary-link" class="home-footer-link">Glossary</button>
        <span class="home-footer-sep">·</span>
        <button id="roots-link" class="home-footer-link">Roots</button>
        <span class="home-footer-sep">·</span>
        <button id="how-it-works-link" class="home-footer-link">Help</button>
      </div>

      <!-- Onboarding modal -->
      <div id="onboarding-modal" class="onboarding-modal" role="dialog" aria-modal="true">
        <div class="onboarding-card">
          <button id="onboarding-skip" class="onboarding-skip">Skip</button>
          <div id="onboarding-content" class="onboarding-content">
            <div id="onboarding-icon" class="onboarding-icon"></div>
            <div id="onboarding-heading" class="onboarding-heading"></div>
            <p id="onboarding-body" class="onboarding-body"></p>
          </div>
          <div class="onboarding-dots">
            <span class="onboarding-dot"></span>
            <span class="onboarding-dot"></span>
            <span class="onboarding-dot"></span>
            <span class="onboarding-dot"></span>
          </div>
          <button id="onboarding-next" class="btn-primary btn-ember">Next</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ── GLOSSARY ──────────────────────────────────────────── -->
  <div id="screen-glossary" class="screen">
    <div class="glossary-header">
      <button id="glossary-back-btn" class="quit-btn" aria-label="Back"></button>
      <div class="glossary-header-title">Asana Glossary</div>
    </div>
    <div class="glossary-body" id="glossary-body"></div>
  </div>

  <!-- ── STATS ──────────────────────────────────────────────── -->
  <div id="screen-stats" class="screen">
    <div class="glossary-header">
      <button id="stats-back-btn" class="quit-btn" aria-label="Back"></button>
      <div class="glossary-header-title">Practice Stats</div>
    </div>
    <div class="stats-body" id="stats-body"></div>
  </div>

  <!-- ── ROOTS ─────────────────────────────────────────────── -->
  <div id="screen-roots" class="screen">
    <div class="glossary-header">
      <button id="roots-back-btn" class="quit-btn" aria-label="Back"></button>
      <div class="glossary-header-title">Sanskrit Roots</div>
    </div>
    <div class="roots-body">
      <div id="roots-count" class="roots-count"></div>
      <p id="roots-hint" class="glossary-hint"></p>
      <div id="roots-grid" class="roots-grid"></div>
    </div>
  </div>

  <!-- ── QUIZ ────────────────────────────────────────────── -->
  <div id="screen-quiz" class="screen">

    <div class="quiz-header">
      <button id="quit-btn" class="quit-btn" aria-label="Quit"></button>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="container quiz-container">

      <div class="question-card">
        <div class="question-label" id="question-label">What is the Sanskrit name?</div>
        <div class="question-text" id="question-text"></div>
      </div>

      <div class="options-grid" id="options-grid"></div>

      <div class="feedback" id="feedback">
        <div class="feedback-text" id="feedback-text"></div>
        <button id="continue-btn" class="btn-continue">Continue</button>
      </div>

    </div>
  </div>

  <!-- ── INSIGHT ─────────────────────────────────────────── -->
  <div id="screen-insight" class="screen">
    <div class="insight-panel">
      <div class="insight-inner">
        <div class="insight-prelude">A moment to breathe</div>
        <div class="insight-root" id="insight-root"></div>
        <div class="insight-rule"></div>
        <div class="insight-meaning" id="insight-meaning"></div>
        <p class="insight-body" id="insight-body"></p>
        <div class="insight-poses-label">You'll find it in</div>
        <div class="insight-poses" id="insight-poses"></div>
        <button id="insight-continue-btn" class="btn-primary btn-ember">Continue</button>
      </div>
    </div>
  </div>

  <!-- ── RESULT ───────────────────────────────────────────── -->
  <div id="screen-result" class="screen">
    <div class="result-panel">
      <div class="result-inner">
        <div class="result-label">Practice complete</div>
        <div class="result-streak" id="result-streak"></div>
        <div class="result-score" id="result-score">0 / 10</div>
        <div class="result-message" id="result-message"></div>
        <div class="result-dots" id="result-dots"></div>
      </div>
    </div>
    <div class="end-flow-footer">
      <button id="end-continue-btn" class="btn-primary btn-ember">Continue</button>
    </div>
  </div>

  <!-- ── MASTERY SUMMARY ──────────────────────────────────── -->
  <div id="screen-mastery-summary" class="screen">
    <div class="mastery-summary-panel">
      <div class="mastery-summary-container">
        <div class="mastery-summary-header">
          <div class="mastery-summary-count" id="mastery-summary-count"></div>
          <div class="mastery-summary-label">New poses mastered</div>
        </div>
        <div class="mastery-summary-scene" id="mastery-summary-scene">
          <div id="mastery-summary-card" class="pose-card">
            <div class="pose-card-front">
              <div class="pose-card-category" id="msc-category"></div>
              <div class="pose-card-body">
                <div class="pose-card-sanskrit" id="msc-sanskrit"></div>
                <div class="pose-card-pronunciation" id="msc-pronunciation"></div>
                <div class="pose-card-rule"></div>
                <div class="pose-card-english" id="msc-english"></div>
              </div>
              <div class="pose-card-mastery" id="msc-mastery"></div>
            </div>
          </div>
        </div>
        <div class="mastery-summary-nav" id="mastery-summary-nav">
          <button id="mastery-summary-prev" class="pose-card-nav-btn" aria-label="Previous"></button>
          <span class="mastery-summary-counter" id="mastery-summary-counter"></span>
          <button id="mastery-summary-next" class="pose-card-nav-btn" aria-label="Next"></button>
        </div>
      </div>
    </div>
    <div class="end-flow-footer">
      <button id="mastery-summary-continue" class="btn-primary btn-ember">Continue</button>
    </div>
  </div>

  <!-- ── STREAK MILESTONE ──────────────────────────────────── -->
  <div id="screen-streak-milestone" class="screen">
    <div class="milestone-panel">
      <div class="milestone-inner">
        <div class="milestone-icon" id="milestone-icon"></div>
        <div class="milestone-number" id="milestone-number"></div>
        <div class="milestone-label" id="milestone-label">days in a row</div>
        <div class="milestone-copy" id="milestone-copy"></div>
      </div>
    </div>
    <div class="end-flow-footer">
      <button id="milestone-continue-btn" class="btn-primary btn-ember">Continue</button>
    </div>
  </div>

  <!-- ── POSE CARD ─────────────────────────────────────────── -->
  <div id="pose-card-overlay" class="pose-card-overlay" aria-modal="true" role="dialog">
    <div class="pose-card-nav">
      <button id="pose-card-prev" class="pose-card-nav-btn" aria-label="Previous"></button>
      <button id="pose-card-back" class="pose-card-back">Back</button>
      <button id="pose-card-next" class="pose-card-nav-btn" aria-label="Next"></button>
    </div>
    <div class="pose-card-scene">
      <div id="pose-card" class="pose-card">
        <div class="pose-card-front">
          <div class="pose-card-category" id="pose-card-category"></div>
          <div class="pose-card-body">
            <div class="pose-card-sanskrit" id="pose-card-sanskrit"></div>
            <button class="pose-card-pronunciation" id="pose-card-pronunciation" aria-label="Hear pronunciation"></button>
            <div class="pose-card-rule"></div>
            <div class="pose-card-english" id="pose-card-english"></div>
          </div>
          <div class="pose-card-mastery" id="pose-card-mastery"></div>
          <div class="pose-card-flip-hint" id="pose-card-flip-hint"></div>
        </div>
        <div class="pose-card-back-face" id="pose-card-back-face">
          <div class="pose-card-back-category" id="pose-card-back-category"></div>
          <p class="pose-card-description" id="pose-card-description"></p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
